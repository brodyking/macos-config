[preview]
max_width = 2400
max_height = 3600

[opener]
play = [

    { run = 'mpv "$@"', shell = true, block = true, desc = "Play Audio", for = "unix" }
]
edit = [
    { run = 'hx "$@"', block = true, shell = true, desc = "Helix", for = "unix" }
]

[open]
rules = [
# This covers mp3, flac, wav, etc.
    { mime = "audio/*", use = "play" },
    
    # This covers mp4, webm, mkv, etc.
    { mime = "video/*", use = "play" },

    # Keeping your specific name rules as a backup
    { name = "*.mp3",   use = "play" },
    { name = "*.flac",  use = "play" },
    { name = "*.webm",  use = "play" },
    { name = "*.mp4",   use = "play" },

    # Map text files, JSON, and common config formats to Helix
    { mime = "text/*",  use = "edit" },
    { mime = "application/json", use = "edit" },
        # Fallback for files without a clear mime type (like dotfiles)
    { name = "*", use = "edit" }
]
